product:
  type: jvm/app
dependencies:
  - $libs.clikt.jvm
  - $libs.ktor.client.java.jvm
  - $libs.ktor.client.core.jvm
  - $libs.logback.core
  - $libs.logback.classic
  - $libs.slf4j.api
  - $libs.dependency.resolution
  - $libs.kotlinx.coroutines.core.jvm
  - $libs.kotlinx.serialization.core.jvm
  - $libs.kotlinx.serialization.json.jvm
test-dependencies:
  - $kotlin.test
repositories:
  - https://packages.jetbrains.team/maven/p/amper/amper
settings:
  kotlin:
    version: 2.4.0
    serialization: json
plugins:
  native-image:
    enabled: true
    graalVmVersion: 24.0.2
    mainClass: org.jetbrains.kmp.resolver.MainKt
    outputDirectory: build/native-image
    archives:
      - os: linux
        arch: x64
        url: https://download.oracle.com/graalvm/24/archive/graalvm-jdk-24.0.2_linux-x64_bin.tar.gz
        sha256: b0161a49bbc1d0f40697532ddfabb8052a5a15e463775e6945fe3e4920259bae
        nativeImagePath: graalvm-jdk-24.0.2+11.1/bin/native-image
      - os: linux
        arch: arm64
        url: https://download.oracle.com/graalvm/24/archive/graalvm-jdk-24.0.2_linux-aarch64_bin.tar.gz
        sha256: 76f2557f32e8cfbe6d8b7bbf331f0f092ebbe1cc36a2678e098305892076298b
        nativeImagePath: graalvm-jdk-24.0.2+11.1/bin/native-image
      - os: macos
        arch: x64
        url: https://download.oracle.com/graalvm/24/archive/graalvm-jdk-24.0.2_macos-x64_bin.tar.gz
        sha256: df0f9e5d101201c50bfa6baa3c657a81a2883c5b5097a9f5ab93dab86f7e3ba2
