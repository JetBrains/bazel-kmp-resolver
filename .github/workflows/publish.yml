name: Publish on release

on:
  release:
    types:
      - published

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Run tests
        run: ./kotlin test
      - name: Package executable jar
        run: ./kotlin package
      - name: Attach executable jar to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          jar_path="build/tasks/_bazel-kmp-resolver_executableJarJvm/bazel-kmp-resolver-jvm-executable.jar"
          test -f "$jar_path"
          gh release upload "$TAG_NAME" "$jar_path"
