name: Publish release

on:
  push:
    tags:
      - "*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.ref_name }}
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Validate release tag
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$ ]]; then
            echo "Release tag must look like 1.2.3 or 1.2.3-rc.1: $GITHUB_REF_NAME" >&2
            exit 1
          fi
      - name: Verify draft release exists
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          is_draft="$(gh release view "$TAG_NAME" --json isDraft --jq '.isDraft')"
          if [[ "$is_draft" != "true" ]]; then
            echo "Release $TAG_NAME must exist as a draft before publishing." >&2
            exit 1
          fi
      - name: Run tests
        run: ./kotlin test
      - name: Package executable jar
        run: ./kotlin package
      - name: Attach executable jar and publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          jar_path="build/tasks/_bazel-kmp-resolver_executableJarJvm/bazel-kmp-resolver-jvm-executable.jar"
          test -f "$jar_path"
          gh release upload "$TAG_NAME" "$jar_path" --clobber
          asset_name="${jar_path##*/}"
          gh release view "$TAG_NAME" --json assets --jq '.assets[].name' | grep -Fx "$asset_name"
          gh release edit "$TAG_NAME" --draft=false
