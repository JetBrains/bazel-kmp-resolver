name: Publish release
run-name: ${{ github.event.inputs.tag_name || github.ref_name }}

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to create or publish, for example 1.2.3
        required: true
        type: string

concurrency:
  group: release-${{ github.event.inputs.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.release.outputs.tag_name }}
      release_sha: ${{ steps.source.outputs.release_sha }}
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Ensure release source is on default branch
        id: source
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" && "$GITHUB_REF_NAME" != "$DEFAULT_BRANCH" ]]; then
            echo "Manual releases must be run from the default branch ($DEFAULT_BRANCH), not $GITHUB_REF_NAME." >&2
            exit 1
          fi

          git fetch --no-tags origin "$DEFAULT_BRANCH:refs/remotes/origin/$DEFAULT_BRANCH"
          release_sha="$(git rev-parse "$GITHUB_SHA^{commit}")"
          if ! git merge-base --is-ancestor "$release_sha" "refs/remotes/origin/$DEFAULT_BRANCH"; then
            echo "Release commit $release_sha is not reachable from the default branch ($DEFAULT_BRANCH)." >&2
            exit 1
          fi

          echo "release_sha=$release_sha" >> "$GITHUB_OUTPUT"
      - name: Resolve release tag
        id: release
        env:
          DISPATCH_TAG_NAME: ${{ github.event.inputs.tag_name }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            tag_name="$DISPATCH_TAG_NAME"
          else
            tag_name="$GITHUB_REF_NAME"
          fi

          if [[ ! "$tag_name" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$ ]]; then
            echo "Release tag must look like 1.2.3 or 1.2.3-rc.1: $tag_name" >&2
            exit 1
          fi

          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: |
          release_args=(
            --draft
            --generate-notes
            --title "$TAG_NAME"
          )

          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            release_args+=(--target "${{ steps.source.outputs.release_sha }}")
          fi

          gh release create "$TAG_NAME" "${release_args[@]}"

  graalvm-native-image-cache:
    needs: prepare-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Restore or save GraalVM archive cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/graalvm-native-image-cache/downloads
          key: graalvm-native-image-${{ hashFiles('module.yaml') }}
          enableCrossOsArchive: true
      - name: Download GraalVM archives
        env:
          GRAALVM_NATIVE_IMAGE_CACHE_DIR: ${{ runner.temp }}/graalvm-native-image-cache
        shell: bash
        run: ./kotlin do cacheGraalVmArchives

  native-image:
    needs:
      - prepare-release
      - graalvm-native-image-cache
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
            executable_extension: ""
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            executable_extension: ""
          - platform: macos-x64
            runner: macos-15-intel
            executable_extension: ""
          - platform: macos-arm64
            runner: macos-15
            executable_extension: ""
          - platform: windows-x64
            runner: windows-latest
            executable_extension: ".exe"
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Restore GraalVM archive cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/graalvm-native-image-cache/downloads
          key: graalvm-native-image-${{ hashFiles('module.yaml') }}
          enableCrossOsArchive: true
      - name: Run tests
        shell: bash
        run: ./kotlin test
      - name: Build native image
        env:
          GRAALVM_NATIVE_IMAGE_CACHE_DIR: ${{ runner.temp }}/graalvm-native-image-cache
        shell: bash
        run: ./kotlin do buildNativeImage
      - name: Smoke-test native binary
        shell: bash
        run: |
          binary="build/native-image/bazel-kmp-resolver-${{ matrix.platform }}${{ matrix.executable_extension }}"
          test -f "$binary"
          "$binary" --help >/dev/null
      - name: Upload native binary
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.prepare-release.outputs.tag_name }}
        shell: bash
        run: |
          binary="build/native-image/bazel-kmp-resolver-${{ matrix.platform }}${{ matrix.executable_extension }}"
          gh release upload "$TAG_NAME" "$binary"

  publish:
    needs:
      - prepare-release
      - native-image
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Verify release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.prepare-release.outputs.tag_name }}
        run: |
          expected_assets=(
            bazel-kmp-resolver-linux-x64
            bazel-kmp-resolver-linux-arm64
            bazel-kmp-resolver-macos-x64
            bazel-kmp-resolver-macos-arm64
            bazel-kmp-resolver-windows-x64.exe
          )

          actual_assets="$(gh release view "$TAG_NAME" --json assets --jq '.assets[].name')"
          for asset in "${expected_assets[@]}"; do
            grep -Fx "$asset" <<< "$actual_assets"
          done
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.prepare-release.outputs.tag_name }}
        run: gh release edit "$TAG_NAME" --draft=false
